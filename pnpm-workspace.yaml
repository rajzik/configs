packages:
  - packages/*
  - '!**/test/**'
  - '!**/__test__/**'

catalog:
  '@ianvs/prettier-plugin-sort-imports': 4.7.1
  '@types/node': 25.6.2
  oxfmt: 0.50.0
  oxlint: ^1.64.0
  oxlint-tsgolint: ^0.22.1
  prettier: 3.8.3
  prettier-plugin-packagejson: 3.0.2
  prettier-plugin-tailwindcss: ^0.8.0
  tsdown: 0.22.0
  turbo: 2.9.8
  typescript: 6.0.3

catalogMode: prefer

ignoreWorkspaceRootCheck: true

linkWorkspacePackages: true
verifyDepsBeforeRun: warn

publicHoistPattern:
  - '*eslint*'
  - '*prettier*'
  - '*vitest*'

savePrefix: ''

allowBuilds:
  '@swc/core': true
  core-js: true
  unrs-resolver: true
