packages:
  - packages/*
  - '!**/test/**'
  - '!**/__test__/**'

catalog:
  '@ianvs/prettier-plugin-sort-imports': 4.7.1
  '@types/node': 25.6.0
  eslint: 10.2.1
  oxfmt: 0.46.0
  oxlint: ^1.61.0
  oxlint-tsgolint: ^0.22.0
  prettier: 3.8.3
  prettier-plugin-packagejson: 3.0.2
  prettier-plugin-tailwindcss: ^0.7.3
  tsdown: 0.21.10
  turbo: 2.9.6
  typescript: 6.0.3
  vitest: 4.1.5

catalogMode: prefer

ignoreWorkspaceRootCheck: true

linkWorkspacePackages: true

onlyBuiltDependencies:
  - '@swc/core'
  - core-js
  - unrs-resolver

publicHoistPattern:
  - '*eslint*'
  - '*vitest*'

savePrefix: ''
