name: Generate changeset for Renovate

on:
  pull_request_target:
    paths:
      - .github/workflows/changesets-renovate.yml
      - '**/pnpm-lock.yaml'
      - pnpm-workspace.yaml
      - '**/package.json'

jobs:
  generate-changeset:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: github.actor == 'renovate[bot]' && github.repository == 'rajzik/configs' && github.event.pull_request.head.repo.full_name == 'rajzik/configs'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          ref: ${{ github.head_ref }}

      - name: Git Identity
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - uses: ./.github/common-actions/install

      - name: Run changesets-renovate
        run: pnpm dlx changesets-renovate
